name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - run: pip install ruff

      - name: Run ruff
        run: ruff check packages/better-webhooks/src/main/resources/splunk/bin/

  appinspect:
    name: Splunk AppInspect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build BetterWebhooks.spl
        run: yarn run package

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install AppInspect
        run: pip install splunk-appinspect

      - name: Run AppInspect
        run: splunk-appinspect inspect BetterWebhooks.spl --mode precert --data-format json | tee appinspect-results.json

      - name: Upload AppInspect results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appinspect-results
          path: appinspect-results.json
          retention-days: 7
